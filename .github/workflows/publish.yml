name: Publish to npm

# Publishes the package to npm with provenance when a GitHub Release is created.
# Uses npm trusted publishing (OIDC) — no long-lived NPM_TOKEN required.
# Required for n8n verified community nodes from 1 May 2026.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm provenance / trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing requires npm >= 11.5.1; Node 22 ships npm 10.x.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Publish (with provenance)
        run: npm publish --provenance --access public --ignore-scripts
